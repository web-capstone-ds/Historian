services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ds_historian_tsdb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${TSDB_DATABASE:-ds_historian}
      POSTGRES_USER: ${TSDB_USER:-historian}
      POSTGRES_PASSWORD: ${TSDB_PASSWORD}
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TSDB_USER:-historian} -d ${TSDB_DATABASE:-ds_historian}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # historian 서비스는 Dockerfile 작성 후 활성화 예정 (H8 이후)
  # historian:
  #   build: .
  #   depends_on:
  #     timescaledb:
  #       condition: service_healthy
  #   env_file: .env
  #   environment:
  #     TSDB_HOST: timescaledb
  #     MQTT_BROKER_URL: mqtt://broker:1883
  #   restart: unless-stopped

volumes:
  tsdb_data:
